replicaCount: 1

image:
  repository: trigger-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

env:
  ENV: integration

service:
  type: NodePort
  port: 8000
  nodePort: 30080

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

command:
  - python
  - -m
  - uvicorn
  - trigger_server.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
